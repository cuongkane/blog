<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="kafkaBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="operatorBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a1a4e"/>
    </linearGradient>
    <linearGradient id="kafkaNodeBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#53d8fb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#kafkaBg)"/>

  <!-- Source Kafka -->
  <rect x="30" y="80" width="160" height="70" rx="10" fill="url(#kafkaNodeBg)" filter="url(#shadow)"/>
  <text x="110" y="108" text-anchor="middle" fill="white" font-size="13" font-weight="600">Kafka</text>
  <text x="110" y="126" text-anchor="middle" fill="#ffccd5" font-size="11">"user-events"</text>
  <text x="110" y="142" text-anchor="middle" fill="#ffccd5" font-size="10">(8 partitions)</text>

  <!-- Arrow 1 -->
  <line x1="190" y1="115" x2="230" y2="115" stroke="#53d8fb" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- KafkaSource -->
  <rect x="235" y="88" width="120" height="54" rx="8" fill="url(#operatorBg)" stroke="#53d8fb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="295" y="120" text-anchor="middle" fill="#53d8fb" font-size="13" font-weight="600">KafkaSource</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="115" x2="395" y2="115" stroke="#53d8fb" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- Dedup -->
  <rect x="400" y="72" width="130" height="86" rx="8" fill="url(#operatorBg)" stroke="#f0a500" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="465" y="104" text-anchor="middle" fill="#f0a500" font-size="13" font-weight="600">Dedup</text>
  <text x="465" y="122" text-anchor="middle" fill="#aab" font-size="10">keyed state:</text>
  <text x="465" y="136" text-anchor="middle" fill="#aab" font-size="9">event seen before?</text>

  <!-- Arrow 3 -->
  <line x1="530" y1="115" x2="570" y2="115" stroke="#53d8fb" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- Enrich -->
  <rect x="575" y="72" width="130" height="86" rx="8" fill="url(#operatorBg)" stroke="#7ed957" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="640" y="104" text-anchor="middle" fill="#7ed957" font-size="13" font-weight="600">Enrich</text>
  <text x="640" y="122" text-anchor="middle" fill="#aab" font-size="10">broadcast state:</text>
  <text x="640" y="136" text-anchor="middle" fill="#aab" font-size="9">live config rules</text>

  <!-- Arrow 4 -->
  <line x1="705" y1="115" x2="745" y2="115" stroke="#53d8fb" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- KafkaSink -->
  <rect x="750" y="88" width="120" height="54" rx="8" fill="url(#operatorBg)" stroke="#53d8fb" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="810" y="120" text-anchor="middle" fill="#53d8fb" font-size="13" font-weight="600">KafkaSink</text>

  <!-- Arrow down to output Kafka -->
  <line x1="810" y1="142" x2="810" y2="185" stroke="#53d8fb" stroke-width="2.5" marker-end="url(#arrowHead)"/>

  <!-- Output Kafka -->
  <rect x="730" y="190" width="160" height="55" rx="10" fill="url(#kafkaNodeBg)" filter="url(#shadow)"/>
  <text x="810" y="215" text-anchor="middle" fill="white" font-size="13" font-weight="600">Kafka</text>
  <text x="810" y="233" text-anchor="middle" fill="#ffccd5" font-size="11">"processed-events"</text>

  <!-- Legend -->
  <rect x="30" y="260" width="12" height="12" rx="2" fill="#f0a500" opacity="0.7"/>
  <text x="48" y="271" fill="#aab" font-size="10">Keyed State</text>
  <rect x="140" y="260" width="12" height="12" rx="2" fill="#7ed957" opacity="0.7"/>
  <text x="158" y="271" fill="#aab" font-size="10">Broadcast State</text>
  <rect x="268" y="260" width="12" height="12" rx="2" fill="#e94560" opacity="0.7"/>
  <text x="286" y="271" fill="#aab" font-size="10">Kafka Topic</text>
</svg>